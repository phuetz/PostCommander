version: '3.8'

services:
  mem0:
    build:
      context: ./memory-engine/server
      dockerfile: Dockerfile
    container_name: mem0_api
    ports:
      - "8000:8000" # REST API will be available at http://localhost:8000
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY} # Make sure this is present in your .env file
      - VECTOR_STORE=postgres
      - POSTGRES_USER=mem0_user
      - POSTGRES_PASSWORD=mem0_pass
      - POSTGRES_DB=mem0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mem0_postgres
    environment:
      - POSTGRES_USER=mem0_user
      - POSTGRES_PASSWORD=mem0_pass
      - POSTGRES_DB=mem0
    ports:
      - "5433:5432" # Mapped to 5433 locally to avoid conflicts with other postgres instances
    volumes:
      - mem0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0_user -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mem0_postgres_data:
